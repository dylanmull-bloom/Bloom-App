<!-- Prenatal Nutrition App v5 - with Recipes & Premium Tier -->
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  :root {
    --color-background-primary: #ffffff;
    --color-background-secondary: #f5f5f5;
    --color-background-tertiary: #efefef;
    --color-text-primary: #1a1a1a;
    --color-text-secondary: #666666;
    --color-text-success: #22863a;
    --color-text-danger: #cb2431;
    --color-text-warning: #bf8700;
    --color-text-info: #0366d6;
    --color-border-secondary: #cccccc;
    --color-border-tertiary: #e1e1e1;
    --color-border-info: #0366d6;
    --border-radius-lg: 8px;
    --border-radius-md: 4px;
    --font-sans: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  }
  
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: var(--font-sans); background: var(--color-background-tertiary); }
  .app-container { width: 100%; max-width: 900px; margin: 0 auto; }
  .header { background: var(--color-background-secondary); padding: 1.5rem; border-radius: var(--border-radius-lg); margin-bottom: 1.5rem; }
  .pricing-banner { background: linear-gradient(135deg, #378ADD 0%, #185FA5 100%); color: white; padding: 1rem; border-radius: var(--border-radius-lg); margin-bottom: 1.5rem; text-align: center; }
  .pricing-toggle { display: flex; justify-content: center; gap: 1rem; margin-bottom: 1.5rem; }
  .tier-badge { background: var(--color-background-secondary); border: 2px solid var(--color-border-tertiary); border-radius: var(--border-radius-md); padding: 0.75rem 1.25rem; cursor: pointer; font-weight: 500; transition: all 0.2s; }
  .tier-badge.active { background: var(--color-background-info); color: white; border-color: var(--color-background-info); }
  .tier-badge:hover { background: var(--color-background-secondary); }
  .pricing-card { background: var(--color-background-secondary); border: 0.5px solid var(--color-border-tertiary); border-radius: var(--border-radius-lg); padding: 1.5rem; margin-bottom: 1rem; }
  .pricing-card.featured { border: 2px solid var(--color-background-info); }
  .card-title { font-size: 18px; font-weight: 500; color: var(--color-text-primary); margin-bottom: 0.5rem; }
  .card-price { font-size: 24px; font-weight: 500; color: var(--color-text-info); margin-bottom: 1rem; }
  .card-price-small { font-size: 14px; color: var(--color-text-secondary); }
  .feature-list { list-style: none; margin-bottom: 1rem; }
  .feature-list li { font-size: 14px; color: var(--color-text-secondary); padding: 0.5rem 0; border-bottom: 0.5px solid var(--color-border-tertiary); }
  .feature-list li:last-child { border-bottom: none; }
  .feature-list li.included::before { content: "✓ "; color: var(--color-text-success); font-weight: 500; }
  .feature-list li.excluded { text-decoration: line-through; opacity: 0.6; }
  .feature-list li.excluded::before { content: "✗ "; color: var(--color-text-secondary); }
